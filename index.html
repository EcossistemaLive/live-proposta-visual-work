<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico MAPCA — Visual Work | Live Consultoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --live-bg: #06192a;
    --live-surface: rgba(255, 255, 255, 0.04);
    --live-border: rgba(255, 255, 255, 0.08);
    --live-neon: #00e800;
    --live-neon-dim: rgba(0, 232, 0, 0.12);
    --live-text: #ffffff;
    --live-muted: #94a3b8;
    --live-danger: #ff4d4d;
    --live-warn: #f59e0b;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Outfit', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background-color: var(--live-bg);
    color: var(--live-text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  h1, h2, h3, h4 { font-family: var(--font-display); color: #fff; letter-spacing: -0.02em; }
  h1 { font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 700; line-height: 1.1; margin-bottom: 24px; }
  h2 { font-size: clamp(1.6rem, 3vw, 2.4rem); margin-bottom: 28px; font-weight: 500; }
  h3 { font-size: 1.3rem; font-weight: 500; margin-bottom: 14px; }
  h4 { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--live-muted); margin-bottom: 10px; }
  p { font-size: 1.05rem; color: var(--live-muted); margin-bottom: 18px; font-weight: 300; }
  strong { color: var(--live-text); font-weight: 500; }

  .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
  section { margin-bottom: 100px; position: relative; }

  .logo { width: 130px; margin-bottom: 56px; }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--live-neon-dim); color: var(--live-neon);
    padding: 6px 14px; border-radius: 100px;
    font-size: 0.8rem; font-weight: 700; font-family: var(--font-display);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 22px;
    border: 1px solid rgba(0, 232, 0, 0.25);
  }
  .badge.danger { background: rgba(255,77,77,0.1); color: var(--live-danger); border-color: rgba(255,77,77,0.25); }
  .badge.warn { background: rgba(245,158,11,0.1); color: var(--live-warn); border-color: rgba(245,158,11,0.25); }
  .badge.neutral { background: rgba(255,255,255,0.05); color: #fff; border-color: rgba(255,255,255,0.1); }

  .glass-panel {
    background: var(--live-surface);
    border: 1px solid var(--live-border);
    border-radius: 16px;
    padding: 36px 32px;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr; gap: 28px; }
  .grid-3 { display: grid; grid-template-columns: 1fr; gap: 20px; }
  .grid-5 { display: grid; grid-template-columns: 1fr; gap: 16px; }
  @media(min-width: 700px) {
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-5 { grid-template-columns: repeat(5, 1fr); }
  }
  @media(min-width: 900px) {
    .grid-2 { grid-template-columns: 1.2fr 0.8fr; align-items: start; }
    .grid-2.reverse { grid-template-columns: 0.8fr 1.2fr; }
    .grid-2.equal { grid-template-columns: 1fr 1fr; }
    .hero-content { padding-right: 40px; }
  }

  .floating-card {
    background: linear-gradient(145deg, rgba(10,20,35,0.85), rgba(5,10,18,0.95));
    border: 1px solid rgba(0, 232, 0, 0.2);
    border-left: 4px solid var(--live-neon);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    animation: float 7s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }
